name: Release npm package

# Tag-driven, OIDC-authenticated npm release pipeline.
#
# Trigger: any `v*` tag push starts the workflow.
# Auth: npm trusted publishing via GitHub Actions OIDC. Configure
#       @opencoven/coven-code on npmjs.com -> Settings -> Trusted Publishers
#       before the first release. No long-lived NPM_TOKEN is required.
# Gate: `verify-tag` requires an annotated, GitHub-verified signed tag, checks
#       the tag against NPM_RELEASE_ALLOWED_SIGNERS, and confirms the tagged
#       commit is contained in the repository default branch.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Release gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Verify npm provenance prerequisites
        env:
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          EXPECTED_REPOSITORY_URL: git+https://github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          if [ "$REPOSITORY_PRIVATE" = "true" ]; then
            echo "::error::npm provenance requires a public source repository. Make this repository public before publishing with provenance."
            exit 1
          fi
          PACKAGE_REPOSITORY_URL=$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.repository?.url ?? '');")
          if [ "$PACKAGE_REPOSITORY_URL" != "$EXPECTED_REPOSITORY_URL" ]; then
            echo "::error::package.json repository.url must match $EXPECTED_REPOSITORY_URL for npm provenance."
            exit 1
          fi
      - run: npm ci
      - name: Verify package version matches release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.version);")
          EXPECTED_VERSION="${TAG_NAME#v}"
          if [ "$PACKAGE_VERSION" = "0.0.0" ]; then
            echo "::error::Refusing to publish placeholder package version $PACKAGE_VERSION."
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Release tag $TAG_NAME does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi
      - run: npm test
      - name: Verify npm package contents
        run: |
          set -euo pipefail
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const [pack] = JSON.parse(readFileSync(process.env.RUNNER_TEMP + '/npm-pack.json', 'utf8'));
          const files = new Set(pack.files.map((file) => file.path));
          const forbiddenPrefixes = ['.git/', '.github/', '.superpowers/', 'test/'];
          const forbidden = [...files].filter((file) => forbiddenPrefixes.some((prefix) => file.startsWith(prefix)));
          if (forbidden.length > 0) {
            console.error(`Refusing to publish package with non-release files:\n${forbidden.join('\n')}`);
            process.exit(1);
          }
          for (const required of ['bin/coven-code.mjs', 'bin/coven-code-sdk.mjs', 'src/sdk.mjs', 'src/main.mjs', 'README.md', 'package.json']) {
            if (!files.has(required)) {
              console.error(`Refusing to publish package missing required file: ${required}`);
              process.exit(1);
            }
          }
          NODE

  verify-tag:
    name: Verify signed release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0
      - name: Confirm tag is annotated, signer-authorized, and on default branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_RELEASE_ALLOWED_SIGNERS: ${{ vars.NPM_RELEASE_ALLOWED_SIGNERS }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be a semver tag like v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi
          if [ "$TAG_NAME" = "v0.0.0" ]; then
            echo "::error::Refusing to publish placeholder version $TAG_NAME."
            exit 1
          fi

          TAG_OBJECT_SHA=$(git rev-parse "$TAG_NAME")
          OBJECT_TYPE=$(git cat-file -t "$TAG_OBJECT_SHA")
          if [ "$OBJECT_TYPE" != "tag" ]; then
            echo "::error::Refusing to release: $TAG_NAME is a lightweight tag, not an annotated signed tag. Re-tag with \`git tag -s $TAG_NAME -m \"$TAG_NAME\"\`."
            exit 1
          fi

          payload=$(gh api "/repos/$GITHUB_REPOSITORY/git/tags/$TAG_OBJECT_SHA")
          verified=$(jq -r '.verification.verified' <<<"$payload")
          reason=$(jq -r '.verification.reason' <<<"$payload")
          if [ "$verified" != "true" ]; then
            echo "::error::Tag $TAG_NAME does not have a GitHub-verified signature (reason=$reason). Re-tag with a signing key registered to your GitHub account."
            exit 1
          fi

          tag_object_type=$(jq -r '.object.type // ""' <<<"$payload")
          TAGGED_COMMIT_SHA=$(jq -r '.object.sha // ""' <<<"$payload")
          echo "tag=$TAG_NAME verified=$verified reason=$reason target=$TAGGED_COMMIT_SHA"
          if [ "$tag_object_type" != "commit" ] || [ -z "$TAGGED_COMMIT_SHA" ]; then
            echo "::error::Refusing release: annotated tag $TAG_NAME targets ${tag_object_type:-unknown}, not a commit."
            exit 1
          fi

          allowed_signers_raw="${NPM_RELEASE_ALLOWED_SIGNERS:-}"
          if [ -z "${allowed_signers_raw//[[:space:]]/}" ]; then
            echo "::error::Repository variable NPM_RELEASE_ALLOWED_SIGNERS must contain one or more SSH allowed-signers lines."
            exit 1
          fi
          allowed_signers_file="$RUNNER_TEMP/coven-code-release-allowed-signers"
          printf '%s\n' "$allowed_signers_raw" > "$allowed_signers_file"
          line_number=0
          while IFS= read -r signer_line || [ -n "$signer_line" ]; do
            line_number=$((line_number + 1))
            if [[ "$signer_line" =~ ^[[:space:]]*$ ]]; then
              echo "::error::NPM_RELEASE_ALLOWED_SIGNERS contains an empty line at line $line_number."
              exit 1
            fi
          done < "$allowed_signers_file"

          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "$allowed_signers_file"
          if ! verify_output=$(git verify-tag "$TAG_NAME" 2>&1); then
            printf '%s\n' "$verify_output"
            echo "::error::Release tag $TAG_NAME is not signed by a key in NPM_RELEASE_ALLOWED_SIGNERS."
            exit 1
          fi
          printf '%s\n' "$verify_output"

          git fetch --no-tags origin "$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor "$TAGGED_COMMIT_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "::error::Refusing release: tagged commit $TAGGED_COMMIT_SHA is not contained in origin/$DEFAULT_BRANCH."
            exit 1
          fi

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    needs: [verify, verify-tag]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: npm ci
      - name: Check whether package version already exists
        id: published
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.name);")
          PACKAGE_VERSION=$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.version);")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish package
        if: steps.published.outputs.published != 'true'
        run: npm publish --provenance --access public
